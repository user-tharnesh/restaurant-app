<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultured Kitchen | AI Chef</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .ai-container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(239, 184, 16, 0.05), transparent);
        }
        .ai-box {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(239, 184, 16, 0.4);
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .category-btn {
            font-size: 1rem;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">CULTURED KITCHEN</div>
        <nav>
            <ul>
                <li><a href="index.html">← Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="ai-container">
        <div class="ai-box">
            <h1 style="color:var(--accent-gold); margin-bottom: 15px; font-size: 2.5rem;">🤖 Dine-In Table-Side AI Chef</h1>
            <p style="margin-bottom: 35px; font-size: 1.2rem; color: #cbd5e1;">Welcome to Cultured Kitchen! While you relax at your table, select your cravings below, and our advanced AI will craft the perfect menu recommendation uniquely tailored to your taste profile.</p>

            <div id="flavor-tags" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px;">
                <button class="category-btn" onclick="toggleTag(this)">Spicy 🌶️</button>
                <button class="category-btn" onclick="toggleTag(this)">Vegetarian 🥗</button>
                <button class="category-btn" onclick="toggleTag(this)">Rich & Creamy 🍛</button>
                <button class="category-btn" onclick="toggleTag(this)">Light 🍃</button>
                <button class="category-btn" onclick="toggleTag(this)">Sweet 🍰</button>
                <button class="category-btn" onclick="toggleTag(this)">Meat 🍗</button>
                <button class="category-btn" onclick="toggleTag(this)">Seafood 🦐</button>
            </div>

            <button class="btn-primary" id="btn-find-flavor" onclick="findFlavor()" style="font-size:1.3rem; padding: 15px 50px;">Find My Perfect Dish ✨</button>
            
            <div id="ai-flavor-result" style="margin-top: 40px; display: none; background: rgba(239, 184, 16, 0.08); padding: 35px; border-radius: 12px; border: 1px solid rgba(239, 184, 16, 0.4);">
                <h2 id="ai-dish-name" style="color: var(--accent-gold); margin-bottom: 15px; font-size: 2.2rem;">Dish Name</h2>
                <p id="ai-dish-desc" style="line-height: 1.8; font-size: 1.3rem; color: #f1f5f9;">Description here...</p>
            </div>
        </div>
    </main>

    <script src="flavor-profiler.js"></script>
</body>
</html>
